<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Maxer - Pro Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: 'Arial', sans-serif; }
        #ui-layer { position: absolute; top: 0; width: 100%; height: 100%; pointer-events: none; }
        #scoreboard { text-align: center; color: white; font-size: 36px; font-weight: bold; margin-top: 20px; text-shadow: 2px 2px 4px #000; }
        .nav-btn { position: absolute; top: 20px; right: 20px; background: #e94560; color: white; text-decoration: none; padding: 12px 24px; font-weight: bold; border-radius: 5px; pointer-events: auto; border: 2px solid white; }
        #stamina-bar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 250px; height: 12px; background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #stamina-fill { width: 100%; height: 100%; background: #00ff00; transition: width 0.1s; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="scoreboard">HOME 0 - 0 AWAY</div>
        <div id="stamina-bar"><div id="stamina-fill"></div></div>
    </div>
    <a href="menu.html" class="nav-btn">EXIT TO CLUB</a>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="game.js"></script>
</body>
</html>

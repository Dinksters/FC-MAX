<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Maxer - Stadium</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: 'Arial', sans-serif; }
        #scoreboard {
            position: absolute; top: 20px; width: 100%; text-align: center; 
            color: white; font-size: 36px; font-weight: bold; 
            text-shadow: 2px 2px 4px #000; pointer-events: none;
        }
        .nav-btn {
            position: absolute; top: 20px; right: 20px; 
            background-color: #e94560; color: white; text-decoration: none; 
            padding: 10px 20px; font-weight: bold; border-radius: 5px; z-index: 100;
            border: 2px solid white;
        }
        /* Stamina Bar UI */
        #stamina-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 10px;
        }
        #stamina-fill {
            width: 100%; height: 100%; background: #00ff00; border-radius: 5px; transition: width 0.1s;
        }
    </style>
</head>
<body>
    <div id="scoreboard">HOME 0 - 0 AWAY</div>
    <a href="menu.html" class="nav-btn">Back to Club</a>
    
    <div id="stamina-container">
        <div id="stamina-fill"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="game.js"></script>
</body>
</html>

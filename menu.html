<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FC Maxer - Club Management</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background-color: #1a1a2e; color: white; display: flex; flex-direction: column; align-items: center; }
        .navbar { width: 100%; background-color: #16213e; padding: 15px 20px; display: flex; justify-content: space-between; border-bottom: 2px solid #e94560; box-sizing: border-box; }
        .play-btn { background: #228b22; color: white; text-decoration: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; border: 2px solid white; }
        .tabs { margin: 20px 0; display: flex; gap: 15px; }
        .tab-btn { background: #0f3460; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .tab-btn.active { background: #e94560; }
        .section { display: none; width: 90%; max-width: 1000px; text-align: center; }
        .section.active { display: block; }
        .pack-btn { background: linear-gradient(45deg, #e94560, #ff2a54); color: white; border: none; padding: 15px 30px; font-size: 20px; border-radius: 8px; cursor: pointer; }
        .grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding: 20px; }
        .card { width: 140px; height: 200px; border-radius: 8px; color: #111; padding: 10px; box-sizing: border-box; text-align: center; cursor: grab; }
        .gold { background: linear-gradient(135deg, #f6d365, #fda085); }
        .silver { background: linear-gradient(135deg, #bdc3c7, #2c3e50); color: white; }
        .bronze { background: linear-gradient(135deg, #d38312, #a83279); color: white; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>FC MAXER</h1>
        <div><a href="index.html" class="play-btn">⚽ PLAY MATCH</a> <span style="margin-left:20px">Coins: <span id="coins">500</span></span></div>
    </div>
    <div class="tabs">
        <button class="tab-btn active" onclick="tab('store')">Store</button>
        <button class="tab-btn" onclick="tab('club')">My Club</button>
    </div>
    <div id="store" class="section active">
        <h2>Packs</h2>
        <button class="pack-btn" onclick="buy()">Open Pack (100 Coins)</button>
        <div id="result" class="grid"></div>
    </div>
    <div id="club" class="section">
        <h2>Your Inventory</h2>
        <div id="club-grid" class="grid"></div>
    </div>

    <script>
        let coins = localStorage.getItem('c') ? parseInt(localStorage.getItem('c')) : 500;
        let club = localStorage.getItem('cl') ? JSON.parse(localStorage.getItem('cl')) : [];
        const db = [{n:"Mbappe", r:91, t:"gold"}, {n:"Bellingham", r:87, t:"gold"}, {n:"Mainoo", r:77, t:"silver"}, {n:"Rookie", r:64, t:"bronze"}];
        
        function update() { 
            document.getElementById('coins').innerText = coins; 
            localStorage.setItem('c', coins); localStorage.setItem('cl', JSON.stringify(club));
        }

        function tab(t) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            if(t === 'club') render();
        }

        function buy() {
            if(coins < 100) return alert("No coins!");
            coins -= 100;
            const p = db[Math.floor(Math.random()*db.length)];
            club.push(p);
            document.getElementById('result').innerHTML = `<div class="card ${p.t}"><h3>${p.r}</h3><p>${p.n}</p></div>`;
            update();
        }

        function render() {
            const g = document.getElementById('club-grid');
            g.innerHTML = club.map(p => `<div class="card ${p.t}"><h3>${p.r}</h3><p>${p.n}</p></div>`).join('');
        }
        update();
    </script>
</body>
</html>

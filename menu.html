<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Maxer - Ultimate Team</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background-color: #1a1a2e; color: white; display: flex; flex-direction: column; align-items: center; }
        
        .navbar { width: 100%; background-color: #16213e; padding: 15px 20px; display: flex; justify-content: space-between; box-sizing: border-box; border-bottom: 2px solid #e94560; }
        .navbar h1 { margin: 0; font-size: 24px; letter-spacing: 2px; }
        .coins { font-weight: bold; color: #ffd700; font-size: 18px; }

        /* Tab Navigation */
        .tabs { margin-top: 20px; display: flex; gap: 20px; }
        .tab-btn { background: #0f3460; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; }
        .tab-btn.active { background: #e94560; font-weight: bold; }

        .dashboard { margin-top: 30px; text-align: center; width: 100%; max-width: 900px; }
        .section { display: none; }
        .section.active { display: block; }

        .open-pack-btn { background: linear-gradient(45deg, #e94560, #ff2a54); color: white; border: none; padding: 15px 40px; font-size: 20px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4); }
        .open-pack-btn:active { transform: scale(0.95); }

        #pack-result { margin-top: 40px; min-height: 350px; display: flex; justify-content: center; align-items: center; }
        
        /* Grid for My Club */
        #club-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; justify-items: center; }

        .player-card { width: 200px; height: 290px; border-radius: 10px; padding: 15px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; color: #111; position: relative; }
        .gold { background: linear-gradient(135deg, #f6d365, #fda085); border: 2px solid #fff; }
        .silver { background: linear-gradient(135deg, #e0c3fc, #8ec5fc); border: 2px solid #fff; }
        .bronze { background: linear-gradient(135deg, #c79081, #dfa579); border: 2px solid #555; }
        .rating { font-size: 32px; font-weight: bold; }
        .position { font-size: 14px; font-weight: bold; }
        .name { font-size: 20px; font-weight: bold; text-align: center; border-bottom: 2px solid rgba(0,0,0,0.2); margin: 10px 0; padding-bottom: 5px; text-transform: uppercase; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 12px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>FC MAXER</h1>
        <div class="coins">Coins: <span id="coin-balance">500</span></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('store')">Store</button>
        <button class="tab-btn" onclick="switchTab('club')">My Club</button>
    </div>

    <div class="dashboard">
        <div id="store" class="section active">
            <h2>Pack Store</h2>
            <p>Cost: 100 Coins per Pack</p>
            <button class="open-pack-btn" onclick="openPack()">Open Standard Pack</button>
            <div id="pack-result"></div>
        </div>

        <div id="club" class="section">
            <h2>My Club Inventory</h2>
            <div id="club-grid"></div>
        </div>
    </div>

    <script>
        const playerDatabase = [
            { id: 1, name: "Mbappe", rating: 91, pos: "ST", tier: "gold", stats: { pac: 97, sho: 89, pas: 80, dri: 92 } },
            { id: 2, name: "Haaland", rating: 91, pos: "ST", tier: "gold", stats: { pac: 89, sho: 93, pas: 66, dri: 80 } },
            { id: 3, name: "Bellingham", rating: 86, pos: "CM", tier: "gold", stats: { pac: 82, sho: 75, pas: 83, dri: 85 } },
            { id: 4, name: "Mitoma", rating: 80, pos: "LM", tier: "silver", stats: { pac: 84, sho: 73, pas: 74, dri: 82 } },
            { id: 5, name: "Garnacho", rating: 79, pos: "LW", tier: "silver", stats: { pac: 86, sho: 72, pas: 68, dri: 81 } },
            { id: 6, name: "Mainoo", rating: 76, pos: "CDM", tier: "silver", stats: { pac: 72, sho: 60, pas: 75, dri: 78 } },
            { id: 7, name: "Rookie Striker", rating: 64, pos: "ST", tier: "bronze", stats: { pac: 65, sho: 60, pas: 55, dri: 58 } },
            { id: 8, name: "Local Defender", rating: 62, pos: "CB", tier: "bronze", stats: { pac: 55, sho: 30, pas: 45, dri: 40 } },
            { id: 9, name: "Reserve Keeper", rating: 60, pos: "GK", tier: "bronze", stats: { pac: 30, sho: 20, pas: 40, dri: 30 } }
        ];

        // --- LOCAL STORAGE LOGIC ---
        // Load coins from memory, or default to 500
        let coins = localStorage.getItem('maxer_coins') ? parseInt(localStorage.getItem('maxer_coins')) : 500;
        document.getElementById('coin-balance').innerText = coins;

        // Load inventory array from memory, or default to empty array
        let myClub = localStorage.getItem('maxer_club') ? JSON.parse(localStorage.getItem('maxer_club')) : [];

        function switchTab(tabId) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');

            if (tabId === 'club') renderClub();
        }

        function openPack() {
            const packCost = 100;
            if (coins < packCost) {
                alert("Not enough coins! Play matches to earn more.");
                return;
            }

            // Deduct and Save Coins
            coins -= packCost;
            localStorage.setItem('maxer_coins', coins);
            document.getElementById('coin-balance').innerText = coins;

            const roll = Math.floor(Math.random() * 100) + 1;
            let pulledPlayer;

            if (roll <= 10) {
                const golds = playerDatabase.filter(p => p.tier === 'gold');
                pulledPlayer = golds[Math.floor(Math.random() * golds.length)];
            } else if (roll <= 40) {
                const silvers = playerDatabase.filter(p => p.tier === 'silver');
                pulledPlayer = silvers[Math.floor(Math.random() * silvers.length)];
            } else {
                const bronzes = playerDatabase.filter(p => p.tier === 'bronze');
                pulledPlayer = bronzes[Math.floor(Math.random() * bronzes.length)];
            }

            // Add player to Club and Save to Memory
            myClub.push(pulledPlayer);
            localStorage.setItem('maxer_club', JSON.stringify(myClub));

            // Display just the pulled card
            document.getElementById('pack-result').innerHTML = createCardHTML(pulledPlayer);
        }

        function renderClub() {
            const grid = document.getElementById('club-grid');
            grid.innerHTML = ''; // Clear grid
            
            if (myClub.length === 0) {
                grid.innerHTML = "<p>Your club is empty. Go open some packs!</p>";
                return;
            }

            // Loop through saved players and draw them
            myClub.forEach(player => {
                grid.innerHTML += createCardHTML(player);
            });
        }

        function createCardHTML(player) {
            return `
                <div class="player-card ${player.tier}">
                    <div class="rating">${player.rating}</div>
                    <div class="position">${player.pos}</div>
                    <div class="name">${player.name}</div>
                    <div class="stats">
                        <div>PAC: ${player.stats.pac}</div>
                        <div>DRI: ${player.stats.dri}</div>
                        <div>SHO: ${player.stats.sho}</div>
                        <div>PAS: ${player.stats.pas}</div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>

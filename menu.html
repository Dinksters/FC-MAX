<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FC Maxer - INFINITY EDITION</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: white; display: flex; flex-direction: column; align-items: center; }
        .navbar { width: 100%; background: #16191e; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #e94560; box-sizing: border-box; }
        .stats-bar { display: flex; gap: 30px; font-weight: bold; font-size: 18px; }
        .btn { padding: 12px 24px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; text-decoration: none; }
        .play { background: #228b22; color: white; border: 2px solid #fff; }
        .tabs { margin: 20px; display: flex; gap: 10px; }
        .tab { background: #2c2f36; color: #888; }
        .tab.active { background: #e94560; color: white; }
        .pane { display: none; width: 95%; max-width: 1200px; }
        .pane.active { display: block; }
        .pitch { background: #2d5a27; height: 550px; border: 4px solid #fff; border-radius: 15px; display: flex; flex-direction: column; justify-content: space-around; padding: 15px; position: relative; }
        .row { display: flex; justify-content: center; gap: 15px; }
        .card { width: 110px; height: 160px; border-radius: 8px; color: #111; padding: 10px; position: relative; box-shadow: 0 4px 10px #000; font-size: 11px; text-align: center; }
        .gold { background: linear-gradient(135deg, #f6d365, #fda085); }
        .silver { background: #bdc3c7; }
        .bronze { background: #cd7f32; color: white; }
        .grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding: 20px; background: #1a1d23; border-radius: 10px; margin-top: 20px; }
        .sell { position: absolute; bottom: 5px; width: 80%; left: 10%; background: #ff2a54; color: white; border: none; border-radius: 3px; font-size: 9px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>FC MAXER <span style="color:#e94560; font-size:12px">∞ EDITION</span></h1>
        <div class="stats-bar">
            <span style="color:#ffd700">🪙 COINS: ∞</span>
            <span style="color:#00ff00">CHEM: <span id="chem">0</span></span>
        </div>
        <a href="index.html" class="btn play">⚽ PLAY MATCH</a>
    </div>

    <div class="tabs">
        <button class="btn tab active" onclick="tab('st')">STORE</button>
        <button class="btn tab" onclick="tab('sq')">SQUAD</button>
        <button class="btn tab" onclick="tab('cl')">CLUB</button>
    </div>

    <div id="st" class="pane active">
        <button class="btn" style="background:#e94560; color:white; width:300px; font-size:20px" onclick="buy()">OPEN FREE PACK (∞)</button>
        <div id="new-card" class="grid"></div>
    </div>

    <div id="sq" class="pane">
        <div class="pitch">
            <div class="row" id="att"></div>
            <div class="row" id="mid"></div>
            <div class="row" id="def"></div>
            <div class="row" id="gk"></div>
        </div>
        <div class="grid" id="bench"></div>
    </div>

    <div id="cl" class="pane">
        <div class="grid" id="full"></div>
    </div>

    <script>
        // Set coins to a massive number that never runs out
        let c = 999999999; 
        let club = JSON.parse(localStorage.getItem('cl') || "[]");
        const pool = [{n:"Yamal",r:82,t:"gold"},{n:"Vini",r:91,t:"gold"},{n:"Bellingham",r:89,t:"gold"},{n:"Rodri",r:91,t:"gold"},{n:"Mainoo",r:78,t:"silver"},{n:"Garnacho",r:80,t:"silver"},{n:"Endrick",r:77,t:"silver"},{n:"Rookie",r:64,t:"bronze"}];

        function sync() {
            localStorage.setItem('cl', JSON.stringify(club));
            // Chem calculation remains same
            let chem = club.reduce((a, b) => a + (b.t === 'gold' ? 10 : 5), 0);
            document.getElementById('chem').innerText = Math.min(chem, 100);
        }

        function tab(id) {
            document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
            if(id === 'sq') renderSq(); if(id === 'cl') renderCl();
        }

        function buy() {
            // No coin check needed
            const p = {...pool[Math.floor(Math.random()*pool.length)], id: Date.now()};
            club.push(p);
            document.getElementById('new-card').innerHTML = card(p, false);
            sync();
        }

        function sell(id) { club = club.filter(p => p.id !== id); sync(); renderCl(); renderSq(); }

        function card(p, s) {
            return `<div class="card ${p.t}"><h2>${p.r}</h2><p><b>${p.n}</b></p>${s ? `<button class="sell" onclick="sell(${p.id})">REMOVE</button>` : ''}</div>`;
        }

        function renderCl() { document.getElementById('full').innerHTML = club.map(p => card(p, true)).join(''); }

        function renderSq() {
            const s = [...club].sort((a,b) => b.r - a.r);
            document.getElementById('att').innerHTML = s.slice(0,3).map(p => card(p, false)).join('');
            document.getElementById('mid').innerHTML = s.slice(3,6).map(p => card(p, false)).join('');
            document.getElementById('def').innerHTML = s.slice(6,10).map(p => card(p, false)).join('');
            document.getElementById('gk').innerHTML = s.slice(10,11).map(p => card(p, false)).join('');
            document.getElementById('bench').innerHTML = s.slice(11, 25).map(p => card(p, false)).join('');
        }
        sync();
    </script>
</body>
</html>
